<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Realife Cafe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://firestore.googleapis.com">
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#A58D79" />
    <link rel="stylesheet" href="/index.css">
    <script>
      // Immediately set the theme from localStorage to prevent FOUC (Flash of Unstyled Content)
      try {
        const storedData = localStorage.getItem('cafe-pos-data');
        if (storedData) {
          const theme = JSON.parse(storedData).theme;
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          }
        }
      } catch (e) {
        console.error('Error setting initial theme from localStorage', e);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then(registration => {
              console.log('ServiceWorker registration successful with scope: ', registration.scope);
            })
            .catch(err => {
              console.log('ServiceWorker registration failed: ', err);
            });
        });
      }
    </script>
  </body>
</html>
