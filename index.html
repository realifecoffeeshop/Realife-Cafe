<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Realife Cafe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" media="print" onload="this.media='all'">
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap">
    </noscript>
    <link rel="preconnect" href="https://firestore.googleapis.com">
    <link rel="preconnect" href="https://images.unsplash.com">
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#A58D79" />
    <script>
      // Immediately set the theme from localStorage to prevent FOUC (Flash of Unstyled Content)
      try {
        const storedData = localStorage.getItem('cafe-pos-data');
        if (storedData) {
          const theme = JSON.parse(storedData).theme;
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          }
        }
      } catch (e) {
        console.error('Error setting initial theme from localStorage', e);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      // Unregister any existing service workers to clear stale caches in dev
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(registrations => {
          for (const registration of registrations) {
            registration.unregister();
          }
        });
      }
    </script>
  </body>
</html>
